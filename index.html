<script type="text/babel">
const { useState, useMemo, useEffect, useRef, useCallback } = React;

/* ============================================================
   UTILITÁRIOS
   ============================================================ */
const normCNPJ = (s) => (s ? String(s).replace(/\D/g, "") : "");
const normCPF  = (s) => (s ? String(s).replace(/\D/g, "") : "");
const parseNum = (s) => {
  if (s === null || s === undefined || s === "") return 0;
  const n = parseFloat(String(s).replace(",", "."));
  return isNaN(n) ? 0 : n;
};
const parseDateBR = (s) => {
  if (!s) return null;
  const m = String(s).match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);
  const m2 = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m2) return new Date(+m2[1], +m2[2]-1, +m2[3]);
  return null;
};
const fmtDate = (d) => d ? d.toLocaleDateString("pt-BR") : "—";
const fmtMoney = (n) => "R$ " + (n||0).toLocaleString("pt-BR",{minimumFractionDigits:2, maximumFractionDigits:2});
const fmtInt = (n) => (n||0).toLocaleString("pt-BR");
const daysBetween = (a, b) => (!a || !b) ? null : Math.round((b - a) / 86400000);
const STATUS_LABEL = { EM_DIA:"Em dia", ATENCAO:"Atenção", CRITICO:"Crítico 90+", SEM_HIST:"Sem histórico" };

/* ============================================================
   VISITAS — persistência por vendedor + dia
   estrutura: { sellerCode: { 'YYYY-MM-DD': { cnpj: { status, checkIn, checkOut, obs } } } }
   status: 'pendente' (default) | 'em_visita' | 'concluido'
   ============================================================ */
const VISITAS_KEY = "ebd_visitas_v3";
const loadVisitasAll = () => { try { return JSON.parse(localStorage.getItem(VISITAS_KEY)||"{}"); } catch { return {}; } };
const saveVisitasAll = (v) => { try { localStorage.setItem(VISITAS_KEY, JSON.stringify(v)); } catch {} };
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const fmtHora = (ts) => ts ? new Date(ts).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}) : "—";
const fmtDuracao = (ms) => {
  if (!ms || ms<0) return "—";
  const min = Math.round(ms/60000);
  if (min<60) return `${min} min`;
  const h = Math.floor(min/60), m = min%60;
  return `${h}h${m>0?` ${m}min`:""}`;
};

/* URL helpers — abrem Maps com trânsito ao vivo */
function mapsDestinationUrl(coordsOrAddress) {
  if (typeof coordsOrAddress === "string") {
    return `https://www.google.com/maps/dir/?api=1&travelmode=driving&destination=${encodeURIComponent(coordsOrAddress)}&dir_action=navigate`;
  }
  const { lat, lon } = coordsOrAddress;
  return `https://www.google.com/maps/dir/?api=1&travelmode=driving&destination=${lat},${lon}&dir_action=navigate`;
}
function mapsRotaCompletaUrl(pontos) {
  if (!pontos || pontos.length<2) return null;
  const o = `${pontos[0].lat},${pontos[0].lon}`;
  const d = `${pontos[pontos.length-1].lat},${pontos[pontos.length-1].lon}`;
  const w = pontos.slice(1,-1).map(c=>`${c.lat},${c.lon}`).join("|");
  return `https://www.google.com/maps/dir/?api=1&travelmode=driving&origin=${o}&destination=${d}${w?`&waypoints=${encodeURIComponent(w)}`:""}`;
}

/* ============================================================
   GEOCODING (Nominatim) + cache localStorage
   ============================================================ */
const GEO_KEY = "ebd_geo_v3";
const loadGeo = () => { try { return JSON.parse(localStorage.getItem(GEO_KEY)||"{}"); } catch { return {}; } };
const saveGeo = (c) => { try { localStorage.setItem(GEO_KEY, JSON.stringify(c)); } catch {} };
const buildAddressQuery = (cli) => [cli.address, cli.neighborhood, cli.city, cli.state, cli.cep, "Brasil"].filter(Boolean).join(", ");
// Múltiplas variações de endereço para aumentar taxa de match no Nominatim
const buildAddressVariations = (cli) => {
  const v = [];
  const full = [cli.address, cli.neighborhood, cli.city, cli.state, cli.cep, "Brasil"].filter(Boolean).join(", ");
  if (full) v.push(full);
  const semCep = [cli.address, cli.neighborhood, cli.city, cli.state, "Brasil"].filter(Boolean).join(", ");
  if (semCep && semCep !== full) v.push(semCep);
  // Endereço sem número (remove dígitos do final) — útil quando o número é inválido
  if (cli.address) {
    const semNum = cli.address.replace(/\s+\d+\s*$/, "").trim();
    if (semNum && semNum !== cli.address) {
      const q = [semNum, cli.neighborhood, cli.city, cli.state, "Brasil"].filter(Boolean).join(", ");
      if (q && !v.includes(q)) v.push(q);
    }
  }
  // Só bairro + cidade + estado
  const soBairro = [cli.neighborhood, cli.city, cli.state, "Brasil"].filter(Boolean).join(", ");
  if (soBairro && !v.includes(soBairro)) v.push(soBairro);
  // CEP isolado + cidade
  if (cli.cep) {
    const cepLimpo = String(cli.cep).replace(/\D/g, "");
    if (cepLimpo.length >= 5) {
      const q = [cepLimpo.replace(/(\d{5})(\d{3})/,'$1-$2'), cli.city, cli.state, "Brasil"].filter(Boolean).join(", ");
      if (!v.includes(q)) v.push(q);
    }
  }
  return v;
};
const sleep = (ms) => new Promise(r => setTimeout(r, ms));
async function nominatimSearch(q) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=br&q=${encodeURIComponent(q)}`,
      { headers: { "Accept-Language": "pt-BR" } });
    if (!r.ok) return null;
    const d = await r.json();
    if (!d || !d.length) return null;
    return { lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon), source: "nominatim" };
  } catch (e) { return null; }
}
// Fallback ViaCEP → coordenadas via Nominatim
async function geocodeByCep(cep, city, state) {
  const cepLimpo = String(cep||"").replace(/\D/g, "");
  if (cepLimpo.length !== 8) return null;
  try {
    const r = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);
    if (!r.ok) return null;
    const d = await r.json();
    if (d?.erro || !d?.logradouro) return null;
    const q = [d.logradouro, d.bairro, d.localidade||city, d.uf||state, "Brasil"].filter(Boolean).join(", ");
    await sleep(1100);
    const r2 = await nominatimSearch(q);
    return r2 ? { ...r2, source: "viacep+nominatim" } : null;
  } catch (e) { return null; }
}

async function geocodeOne(cli, primaryKey) {
  const variations = buildAddressVariations(cli);
  for (const q of variations) {
    const r = await nominatimSearch(q);
    if (r) return r;
    await sleep(1100);
  }
  // Última tentativa: ViaCEP
  if (cli.cep) {
    const r = await geocodeByCep(cli.cep, cli.city, cli.state);
    if (r) return r;
  }
  return null;
}

// recebe lista de clientes (não strings)
async function geocodeBatch(clientes, onProgress) {
  const cache = loadGeo();
  const out = {};
  let done = 0;
  const total = clientes.length;
  const failed = [];
  for (const cli of clientes) {
    const key = buildAddressQuery(cli);
    if (!key) { done++; onProgress?.(done, total, failed); continue; }
    if (cache[key]?.lat) { out[key] = cache[key]; done++; onProgress?.(done, total, failed); continue; }
    try {
      const r = await geocodeOne(cli, key);
      if (r?.lat) { cache[key] = r; out[key] = r; }
      else { failed.push(cli); }
    } catch (e) { console.warn("Geocode falhou para", cli.name, e); failed.push(cli); }
    done++;
    onProgress?.(done, total, failed);
  }
  saveGeo(cache);
  return { out, failed };
}

/* ============================================================
   OSRM ROUTING + NEAREST NEIGHBOR
   ============================================================ */
async function osrmRoute(coords) {
  if (!coords || coords.length < 2) return null;
  const path = coords.map(c => `${c.lon},${c.lat}`).join(";");
  const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${path}?overview=full&geometries=geojson&annotations=duration,distance`);
  if (!r.ok) return null;
  const d = await r.json();
  if (!d?.routes?.length) return null;
  const route = d.routes[0];
  return {
    geometry: route.geometry,
    distance_m: route.distance, duration_s: route.duration,
    legs: route.legs.map(l => ({ distance_m: l.distance, duration_s: l.duration })),
  };
}
const haversineKm = (a, b) => {
  const R = 6371, toRad = x => x*Math.PI/180;
  const dLat = toRad(b.lat - a.lat), dLon = toRad(b.lon - a.lon);
  const h = Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
};
function nearestNeighborOrder(points, startIdx=0) {
  if (!points || !points.length) return [];
  const used = new Set([startIdx]);
  const order = [startIdx];
  while (order.length < points.length) {
    const last = points[order[order.length-1]];
    let best = -1, bestD = Infinity;
    for (let i=0; i<points.length; i++) {
      if (used.has(i)) continue;
      const d = haversineKm(last, points[i]);
      if (d < bestD) { bestD = d; best = i; }
    }
    if (best<0) break;
    order.push(best); used.add(best);
  }
  return order;
}

/* ============================================================
   PDF parsing — extrai texto + tenta extrair imagens por página
   ============================================================ */
async function pdfExtractTextAndImages(file, onProgress) {
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
  const pages = [];
  const MAX_PAGES = 80;          // limite de segurança
  const MAX_RENDER_PAGES = 30;   // só renderiza canvas das primeiras 30 para evitar memória
  const total = Math.min(pdf.numPages, MAX_PAGES);
  for (let i=1; i<=total; i++) {
    try {
      const page = await pdf.getPage(i);
      const tc = await page.getTextContent();
      const text = tc.items.map(it => it.str).join(" ");
      let dataUrl = null;
      if (i <= MAX_RENDER_PAGES) {
        try {
          const viewport = page.getViewport({ scale: 0.8 });
          const canvas = document.createElement("canvas");
          canvas.width = viewport.width; canvas.height = viewport.height;
          const ctx = canvas.getContext("2d");
          await page.render({ canvasContext: ctx, viewport }).promise;
          dataUrl = canvas.toDataURL("image/jpeg", 0.55);
        } catch (e) { /* render falhou — segue sem imagem */ }
      }
      pages.push({ page: i, text, dataUrl });
      onProgress?.(i, total);
    } catch (e) {
      pages.push({ page: i, text: "", dataUrl: null, error: String(e?.message||e) });
    }
  }
  const full = pages.map(p => p.text).join("\n");
  return { pages, full, numPages: pdf.numPages, processed: pages.length };
}

/* ============================================================
   IMAGENS DE PRODUTO via OpenFoodFacts (CORS aberto, gratuito)
   Cache em localStorage. Não inventa imagem — só retorna se a API tiver.
   ============================================================ */
const IMG_KEY = "ebd_imgs_v3";
const loadImgs = () => { try { return JSON.parse(localStorage.getItem(IMG_KEY)||"{}"); } catch { return {}; } };
const saveImgs = (c) => { try { localStorage.setItem(IMG_KEY, JSON.stringify(c)); } catch {} };
async function fetchProductImageByEAN(ean) {
  const cache = loadImgs();
  if (ean in cache) return cache[ean];
  try {
    const r = await fetch(`https://world.openfoodfacts.org/api/v0/product/${encodeURIComponent(ean)}.json`);
    if (!r.ok) { cache[ean] = null; saveImgs(cache); return null; }
    const d = await r.json();
    if (d?.status === 1 && d?.product) {
      const img = d.product.image_front_url || d.product.image_url || d.product.image_thumb_url || null;
      const result = img ? { url: img, name: d.product.product_name || d.product.generic_name || null, brand: d.product.brands || null } : null;
      cache[ean] = result; saveImgs(cache); return result;
    }
    cache[ean] = null; saveImgs(cache); return null;
  } catch (e) { return null; }
}

/* ============================================================
   DETECÇÃO DE PROMOS DO JORNALZINHO
   - matchea EAN/SKU em texto extraído do PDF
   - puxa contexto e preço (R$) próximo
   - desconto vindo do PDF, preço de lista vindo da planilha de Estoque
   ============================================================ */
function detectarPromos(pdfText, engine) {
  if (!pdfText) return [];
  const promos = [];
  const eansEst = new Set(engine.estByEan.keys());
  const eansVend = new Set();
  engine.vendasByCnpjEan.forEach(v => eansVend.add(v.ean));
  const skuToEan = new Map();
  engine.vendasByCnpjEan.forEach(v => v.sku && !skuToEan.has(String(v.sku)) && skuToEan.set(String(v.sku), v.ean));

  // 1) EAN (12-14 dígitos)
  const seen = new Set();
  const reEAN = /\b\d{12,14}\b/g; let m;
  while ((m = reEAN.exec(pdfText)) !== null) {
    const ean = m[0];
    if (seen.has(ean)) continue;
    if (!eansEst.has(ean) && !eansVend.has(ean)) continue;
    seen.add(ean);
    const idx = m.index;
    const ctx = pdfText.substring(Math.max(0, idx-100), Math.min(pdfText.length, idx+150)).replace(/\s+/g," ").trim();
    const precoM = ctx.match(/R\$\s*([\d.,]+)/);
    const descM = ctx.match(/(-?\d{1,2})\s*%/);
    promos.push({
      ean, sku: null, matchedBy: "EAN", contexto: ctx,
      precoTextoPromo: precoM ? precoM[1] : null,
      precoPromoNum: precoM ? parseNum(precoM[1]) : null,
      descontoPct: descM ? parseInt(descM[1]) : null,
      est: engine.estByEan.get(ean), prod: engine.prodByEan.get(ean),
    });
  }
  // 2) SKU (3-6 dígitos) — só se cair em Vendas (evita ruído)
  const reSKU = /\b\d{3,6}\b/g;
  while ((m = reSKU.exec(pdfText)) !== null) {
    const s = m[0];
    const ean = skuToEan.get(s);
    if (!ean || seen.has(ean)) continue;
    seen.add(ean);
    const idx = m.index;
    const ctx = pdfText.substring(Math.max(0, idx-100), Math.min(pdfText.length, idx+150)).replace(/\s+/g," ").trim();
    const precoM = ctx.match(/R\$\s*([\d.,]+)/);
    const descM = ctx.match(/(-?\d{1,2})\s*%/);
    promos.push({
      ean, sku: s, matchedBy: "SKU", contexto: ctx,
      precoTextoPromo: precoM ? precoM[1] : null,
      precoPromoNum: precoM ? parseNum(precoM[1]) : null,
      descontoPct: descM ? parseInt(descM[1]) : null,
      est: engine.estByEan.get(ean), prod: engine.prodByEan.get(ean),
    });
  }
  return promos;
}

/* ============================================================
   DETECÇÃO DE CAMPANHAS — últimos slides do PDF
   Heurística: blocos com palavras "campanha", "ganhe R$", "positiv", "meta"
   ============================================================ */
function detectarCampanhas(pdfPages) {
  if (!pdfPages || !pdfPages.length) return [];
  const ultimas = pdfPages.slice(-Math.min(12, pdfPages.length));
  const camps = [];
  ultimas.forEach(p => {
    const t = p.text;
    if (!t) return;
    const tLow = t.toLowerCase();
    const hasKey = ["campanha", "ganhe", "positivação", "positiva", "meta", "bônus", "bonus", "incentivo", "prêmio", "premio"].some(k => tLow.includes(k));
    if (!hasKey) return;
    const valM = t.match(/R\$\s*([\d.,]+)/g);
    const pctM = t.match(/(\d{1,3})\s*%/g);
    camps.push({
      page: p.page,
      pageImage: p.dataUrl,
      texto: t.substring(0, 600),
      valoresMencionados: valM ? valM.slice(0,5) : [],
      percentuaisMencionados: pctM ? pctM.slice(0,5) : [],
    });
  });
  return camps;
}

/* ============================================================
   DAYS ON HAND (DOH)
   DOH = estoque_qtd ÷ media_diaria_vendas
   Saudável: ~30 dias. Alto: >60 dias. Crítico baixo: <7 dias.
   Mais robusto: estoque_valorizado ÷ (media_vendas_diaria * preco) × 30
   Como temos só volume/qtd, fazemos por unidades:
   ============================================================ */
function calcDOH(ean, est, vendasByCnpjEan, refDate, periodoVendas) {
  if (!est || est.qtd <= 0) return { doh: 0, classificacao: "sem_estoque", vendaMediaDia: 0 };
  // Soma volume vendido desse EAN
  let totalQtd = 0;
  vendasByCnpjEan.forEach(v => { if (v.ean === ean) totalQtd += v.qtd; });
  if (totalQtd <= 0) return { doh: Infinity, classificacao: "sem_giro", vendaMediaDia: 0 };
  const diasPeriodo = Math.max(1, periodoVendas);
  const vendaMediaDia = totalQtd / diasPeriodo;
  const doh = est.qtd / vendaMediaDia;
  let classificacao;
  if (doh < 7) classificacao = "baixo";          // pode faltar
  else if (doh <= 45) classificacao = "saudavel";
  else if (doh <= 90) classificacao = "alto";    // começar a dar saída
  else classificacao = "critico_alto";           // urgência de venda
  return { doh: Math.round(doh), classificacao, vendaMediaDia: Number(vendaMediaDia.toFixed(2)) };
}

/* ============================================================
   PARSER CSV
   ============================================================ */
const parseCSV = (file) => new Promise((resolve, reject) => {
  Papa.parse(file, {
    header: true, skipEmptyLines: true, delimiter: ";",
    transformHeader: h => h.trim(),
    complete: (r) => resolve(r.data), error: reject,
  });
});

/* ============================================================
   ENGINE
   ============================================================ */
function buildEngine(data) {
  const { vendedores=[], carteira=[], clientes=[], roteiros=[], vendas=[], estoque=[], produtos=[] } = data;

  // VENDEDORES
  const vendByCode = new Map(), vendByCpf = new Map();
  vendedores.forEach(v => {
    const code = String(v.internal_code||"").trim();
    const cpf  = normCPF(v.cpf);
    const obj = { ...v, internal_code: code, cpf, ativo: (v.delete||"").trim().toUpperCase() !== "S" };
    if (code) vendByCode.set(code, obj);
    if (cpf)  vendByCpf.set(cpf, obj);
  });

  // CARTEIRA
  const carteiraByCpf = new Map();
  carteira.forEach(c => {
    const cpf = normCPF(c.sellers_identify);
    const pdv = normCNPJ(c.point_of_sale_identify);
    if (!cpf || !pdv) return;
    if (!carteiraByCpf.has(cpf)) carteiraByCpf.set(cpf, new Set());
    carteiraByCpf.get(cpf).add(pdv);
  });

  // CLIENTES — agora exibimos código externo prominentemente
  const cliByCnpj = new Map();
  const cliByExtCode = new Map();
  clientes.forEach(c => {
    const id = normCNPJ(c.identify);
    if (!id) return;
    const obj = {
      cnpj: id, cnpj_fmt: c.identify, external_code: c.external_code,
      name: c.name || c.nickname || "(sem nome)", nickname: c.nickname,
      tag: c.tag, ramo: c.tag,  // alias: tag = ramo
      address: c.address, neighborhood: c.neighborhood, cep: c.cep,
      city: c.city, state: c.state, phone: c.phone,
      channel: c.channel, segment: c.segment,
      route_code: c.code_route, route_desc: c.desc_route,
      square_code: c.code_square, square_desc: c.desc_square,
      seller: c.seller, supervisor: c.supervisor, manager: c.manager,
      economic_group: c.economic_group,
    };
    cliByCnpj.set(id, obj);
    if (c.external_code) cliByExtCode.set(String(c.external_code).trim(), obj);
  });

  // PRODUTOS (planilha opcional — quando vier)
  const prodByEan = new Map();
  const prodBySku = new Map();
  produtos.forEach(p => {
    const ean = String(p.ean||"").trim();
    const sku = String(p.sku||p.internal_code||"").trim();
    const obj = {
      ean, sku, internal_code: p.internal_code,
      name: p.name, manufacturer: p.manufacturer, brand: p.brand,
      category: p.category, subcategory: p.subcategory,
      department: p.department, section: p.section,
      cnpj_manufacturer: p.cnpj_manufacturer,
      tags: p.tags, status: p.status,
      weight: parseNum(p.weight), weight_unity: p.weight_unity,
    };
    if (ean) prodByEan.set(ean, obj);
    if (sku) prodBySku.set(sku, obj);
  });

  // ROTEIROS
  const rotByCode = new Map();
  roteiros.forEach(r => {
    const code = String(r.user_internal_code||"").trim();
    const cnpj = normCNPJ(r.customer_identify);
    if (!code) return;
    const d = parseDateBR(r.date);
    if (!rotByCode.has(code)) rotByCode.set(code, []);
    rotByCode.get(code).push({ cnpj, customer_code: r.customer_code, date: d, dateStr: r.date, order: parseInt(r.order)||0, name: r.name });
  });
  rotByCode.forEach(list => list.sort((a,b) => (a.date?.getTime()||0)-(b.date?.getTime()||0) || a.order-b.order));

  // VENDAS
  let maxDateVendas = null, minDateVendas = null;
  const vendasByCnpj = new Map();
  const vendasByVendedorCode = new Map();
  const vendasByCnpjEan = new Map();
  vendas.forEach(v => {
    const cnpj = normCNPJ(v.point_of_sale_cnpj);
    const code = String(v.seller_internal_code||"").trim();
    const d    = parseDateBR(v.sale_date);
    const ean  = String(v.sale_ean||"").trim();
    const sku  = String(v.sale_sku||"").trim();
    const valor = parseNum(v.sale_sellout_money);
    const volume = parseNum(v.sale_sellout_volume);
    const obj = { cnpj, code, date: d, dateStr: v.sale_date, ean, sku, dun: v.sale_dun, valor, volume, sale_channel: v.sale_channel, pdv_name: v.point_of_sale_name };
    if (cnpj) (vendasByCnpj.get(cnpj) || vendasByCnpj.set(cnpj, []).get(cnpj)).push(obj);
    if (code) (vendasByVendedorCode.get(code) || vendasByVendedorCode.set(code, []).get(code)).push(obj);
    if (cnpj && ean) {
      const k = `${cnpj}|${ean}`;
      if (!vendasByCnpjEan.has(k)) vendasByCnpjEan.set(k, { cnpj, ean, sku, qtd:0, valor:0, n:0, lastDate:null });
      const a = vendasByCnpjEan.get(k);
      a.qtd += volume; a.valor += valor; a.n += 1;
      if (d && (!a.lastDate || d > a.lastDate)) a.lastDate = d;
    }
    if (d) {
      if (!maxDateVendas || d > maxDateVendas) maxDateVendas = d;
      if (!minDateVendas || d < minDateVendas) minDateVendas = d;
    }
  });

  // ESTOQUE — pega melhor (mais recente, maior qtd) por EAN
  const estByEan = new Map();
  estoque.forEach(e => {
    const ean = String(e.ean_sku||"").trim();
    if (!ean) return;
    const qtd = parseNum(e.unit_quantity);
    const obj = {
      ean, qtd, unit: e.unit_abbrev,
      list_price: parseNum(e.list_price), cost: parseNum(e.cost_price),
      margin: parseNum(e.margin), validity: e.product_validity,
      turnover: parseNum(e.turnover_days), lead_time: parseNum(e.lead_time),
      availability: e.availability_status, weight: parseNum(e.weight),
    };
    if (!estByEan.has(ean) || estByEan.get(ean).qtd < qtd) estByEan.set(ean, obj);
  });

  // refDate
  const refDate = maxDateVendas || new Date();
  const periodoVendasDias = (minDateVendas && maxDateVendas) ? Math.max(1, daysBetween(minDateVendas, maxDateVendas) + 1) : 1;

  // SELLERS consolidados
  const sellerSet = new Map();
  vendedores.forEach(v => sellerSet.set(v.internal_code, {
    internal_code: v.internal_code, cpf: v.cpf, name: v.name, email: v.email,
    ativo: (v.delete||"").trim().toUpperCase()!=="S", origem: ['Vendedores']
  }));
  carteiraByCpf.forEach((_, cpf) => {
    const v = vendByCpf.get(cpf);
    if (!v) sellerSet.set(`cpf:${cpf}`, { internal_code: null, cpf, name: `(sem cadastro — CPF ${cpf.slice(0,4)}…)`, ativo: true, origem: ['Carteira sem cadastro'] });
  });
  const sellers = Array.from(sellerSet.values());

  function clientesDoVendedor(seller) {
    if (!seller) return [];
    const cnpjsCart = seller.cpf ? (carteiraByCpf.get(seller.cpf) || new Set()) : new Set();
    const cnpjsRot = new Set((seller.internal_code && rotByCode.get(seller.internal_code) || []).map(r => r.cnpj));
    const all = new Set([...cnpjsCart, ...cnpjsRot]);
    if (seller.internal_code && vendasByVendedorCode.has(seller.internal_code)) {
      vendasByVendedorCode.get(seller.internal_code).forEach(v => v.cnpj && all.add(v.cnpj));
    }
    const out = [];
    all.forEach(cnpj => {
      const cli = cliByCnpj.get(cnpj);
      const vendasCli = vendasByCnpj.get(cnpj) || [];
      const ultVenda = vendasCli.reduce((acc, v) => (v.date && (!acc || v.date>acc)) ? v.date : acc, null);
      const totVenda = vendasCli.reduce((a,v)=>a+v.valor, 0);
      const numVenda = vendasCli.length;
      const diasSemVenda = ultVenda ? daysBetween(ultVenda, refDate) : null;
      // 90 dias para crítico (decisão Thomaz)
      let status = "SEM_HIST";
      if (ultVenda) {
        if (diasSemVenda <= 30) status = "EM_DIA";
        else if (diasSemVenda <= 90) status = "ATENCAO";
        else status = "CRITICO";
      }
      const noRoteiro = cnpjsRot.has(cnpj);
      const naCarteira = cnpjsCart.has(cnpj);
      const rotEntry = seller.internal_code && rotByCode.get(seller.internal_code) ? rotByCode.get(seller.internal_code).find(r => r.cnpj === cnpj) : null;
      out.push({ cnpj, cli: cli || { cnpj, cnpj_fmt: cnpj, name: "(não cadastrado)", external_code: "—" },
        ultVenda, totVenda, numVenda, diasSemVenda, status, noRoteiro, naCarteira, rotEntry, vendasCli });
    });
    return out;
  }

  function scoreCliente(c) {
    let sRec = 0;
    if (c.diasSemVenda === null) sRec = 70;
    else if (c.diasSemVenda > 90) sRec = 100;
    else if (c.diasSemVenda > 30) sRec = 65;
    else sRec = 25;
    const sHist = Math.min(100, c.totVenda / 500);
    const sOp = (c.vendasCli?.length||0) > 3 ? 70 : ((c.vendasCli?.length||0) > 0 ? 50 : 25);
    const sCob = (c.naCarteira && !c.noRoteiro) ? 100 : (c.naCarteira && c.noRoteiro ? 60 : 80);
    const sQual = c.cli?.cep ? 100 : 50;
    const total = sRec*0.4 + sHist*0.25 + sOp*0.2 + sCob*0.1 + sQual*0.05;
    const motivos = [];
    if (c.diasSemVenda === null) motivos.push("Sem histórico confiável de visita/venda.");
    else if (c.diasSemVenda > 90) motivos.push(`${c.diasSemVenda} dias sem comprar (proxy via última venda). Crítico de recuperação.`);
    else if (c.diasSemVenda > 30) motivos.push(`${c.diasSemVenda} dias desde a última compra — atenção.`);
    if (c.naCarteira && !c.noRoteiro) motivos.push("Está na carteira mas fora do roteiro do período.");
    if (c.totVenda > 0) motivos.push(`Histórico de ${fmtMoney(c.totVenda)} em vendas.`);
    if (c.cli && !c.cli.cep) motivos.push("Endereço incompleto — confirmar antes de visitar.");
    if (!motivos.length) motivos.push("Manter cobertura padrão.");
    return { total: Math.round(total), motivos };
  }

  function recomendaProdutos(c, limit=5) {
    const eansComprados = new Map();
    (c.vendasCli||[]).forEach(v => {
      if (!v.ean) return;
      if (!eansComprados.has(v.ean)) eansComprados.set(v.ean, { ean:v.ean, sku:v.sku, qtd:0, valor:0, n:0, lastDate:null });
      const a = eansComprados.get(v.ean);
      a.qtd += v.volume; a.valor += v.valor; a.n += 1;
      if (v.date && (!a.lastDate || v.date>a.lastDate)) a.lastDate = v.date;
    });
    const ultDate = c.ultVenda;
    const eansUltima = new Set((c.vendasCli||[]).filter(v => v.date && ultDate && v.date.getTime()===ultDate.getTime()).map(v => v.ean));
    const cands = [];
    eansComprados.forEach(p => {
      const est = estByEan.get(p.ean);
      const prod = prodByEan.get(p.ean);
      const naUlt = eansUltima.has(p.ean);
      const diasUlt = p.lastDate ? daysBetween(p.lastDate, refDate) : null;
      let conf = "BAIXA"; const ms = [];
      if (p.n >= 2) { conf = "MÉDIA"; ms.push(`Recorrente (${p.n}× compras).`); }
      if (p.n >= 1 && !naUlt && diasUlt > 10) { conf = "ALTA"; ms.push(`Comprava e não comprou na última venda (${diasUlt}d).`); }
      if (naUlt) ms.push("Está na última venda — reposição.");
      if (est?.qtd > 0) ms.push(`Estoque ${fmtInt(est.qtd)} ${est.unit||"un"}.`);
      else { ms.push("Sem estoque cadastrado — alerta."); conf = "BAIXA"; }
      let score = p.n*10 + Math.min(50, p.valor/100);
      if (est?.qtd > 0) score += 20;
      if (!naUlt && p.n>=2) score += 25;
      cands.push({ ...p, est, prod, conf, motivos: ms, score, naUltVenda: naUlt, diasUltCompra: diasUlt });
    });
    return cands.sort((a,b)=>b.score-a.score).slice(0, limit);
  }

  /* ========================================================
     RECOMENDAÇÃO INTELIGENTE — cruza histórico × informativo × ramo
     Tipos:
     1) reposicao        — cliente JÁ compra + está no informativo
     2) novoInformativo  — cliente NUNCA comprou, mas clientes do mesmo ramo compram
     3) recompra         — cliente comprava e não comprou na última venda (sem promo)
     4) campanha         — produto vinculado a campanha vigente (texto)
     ======================================================== */
  function recomendaInteligente(c, promos = [], campanhas = []) {
    const cesta = new Set((c.vendasCli||[]).map(v => v.ean).filter(Boolean));
    const promosByEan = new Map(promos.map(p => [p.ean, p]));
    const ramo = c.cli?.ramo || c.cli?.tag || null;
    const ultDate = c.ultVenda;
    const eansUltima = new Set((c.vendasCli||[])
      .filter(v => v.date && ultDate && v.date.getTime() === ultDate.getTime())
      .map(v => v.ean));
    const eansFreq = new Map();
    (c.vendasCli||[]).forEach(v => {
      if (!v.ean) return;
      eansFreq.set(v.ean, (eansFreq.get(v.ean)||0) + 1);
    });

    // 1) Reposição — já compra E está no informativo
    const reposicao = [];
    cesta.forEach(ean => {
      const promo = promosByEan.get(ean);
      if (!promo) return;
      const est = estByEan.get(ean);
      const prod = prodByEan.get(ean);
      const freq = eansFreq.get(ean) || 1;
      const lastDate = (c.vendasCli||[]).filter(v=>v.ean===ean).reduce((a,v)=>(v.date&&(!a||v.date>a))?v.date:a, null);
      const dias = lastDate ? daysBetween(lastDate, refDate) : null;
      reposicao.push({
        ean, sku: prod?.sku || promo.sku, prod, est, promo,
        tipo: "reposicao", freq, ultCompraEan: lastDate, diasUltCompraEan: dias,
        motivo: `Cliente já compra (${freq}×) e o item está em destaque no informativo${promo.descontoPct?` (${Math.abs(promo.descontoPct)}% off)`:""}. Reposição garantida.`,
        score: 100 + freq*5 + (est?.qtd>0?20:-30),
      });
    });

    // 2) Novo do informativo — cliente NÃO compra, mas clientes do MESMO ramo compram
    const novoInformativo = [];
    if (ramo) {
      // Pré-compute: para cada EAN, quantos clientes do mesmo ramo compram
      const ramoEanCount = new Map();
      cliByCnpj.forEach((cli, cnpj) => {
        if (cnpj === c.cnpj) return;
        const r = cli.ramo || cli.tag;
        if (r !== ramo) return;
        const vs = vendasByCnpj.get(cnpj) || [];
        const eansDeste = new Set(vs.map(v => v.ean).filter(Boolean));
        eansDeste.forEach(e => ramoEanCount.set(e, (ramoEanCount.get(e)||0) + 1));
      });
      promos.forEach(promo => {
        if (cesta.has(promo.ean)) return; // já está em reposição
        const n = ramoEanCount.get(promo.ean) || 0;
        if (n < 1) return;
        const est = estByEan.get(promo.ean);
        const prod = prodByEan.get(promo.ean);
        novoInformativo.push({
          ean: promo.ean, sku: prod?.sku || promo.sku, prod, est, promo,
          tipo: "novoInformativo", countSimilares: n, ramo,
          motivo: `${n} cliente${n>1?"s":""} do ramo "${ramo}" já compra${n>1?"m":""}. Está no informativo — oportunidade de introduzir.`,
          score: 60 + n*8 + (est?.qtd>0?20:-30) + (promo.descontoPct?10:0),
        });
      });
    }

    // 3) Recompra esquecida — recorrente, não comprou na última venda, e NÃO está em reposição (já incluído)
    const recompra = [];
    eansFreq.forEach((freq, ean) => {
      if (freq < 2) return;
      if (eansUltima.has(ean)) return;
      if (promosByEan.has(ean)) return; // se está no informativo, já é reposição
      const est = estByEan.get(ean);
      const prod = prodByEan.get(ean);
      const lastDate = (c.vendasCli||[]).filter(v=>v.ean===ean).reduce((a,v)=>(v.date&&(!a||v.date>a))?v.date:a, null);
      const dias = lastDate ? daysBetween(lastDate, refDate) : null;
      recompra.push({
        ean, sku: prod?.sku, prod, est, tipo: "recompra", freq, diasUltCompraEan: dias,
        motivo: `Comprou ${freq}× anteriormente e ficou de fora da última venda (${dias||"?"}d). Reposição esquecida.`,
        score: 40 + freq*4 + (est?.qtd>0?15:-30),
      });
    });

    // 4) Campanha aplicável — heurística: campanha cita texto que aparece no nome do produto comprado
    const campanha = [];
    if (campanhas?.length && cesta.size>0) {
      campanhas.forEach((camp, ci) => {
        const lower = (camp.texto||"").toLowerCase();
        cesta.forEach(ean => {
          const prod = prodByEan.get(ean);
          const nome = (prod?.name||"").toLowerCase();
          const marca = (prod?.brand||"").toLowerCase();
          if (!nome && !marca) return;
          const matchN = nome && nome.length>3 && lower.includes(nome.substring(0, Math.min(15, nome.length)));
          const matchM = marca && marca.length>3 && lower.includes(marca);
          if (matchN || matchM) {
            const est = estByEan.get(ean);
            campanha.push({
              ean, sku: prod?.sku, prod, est, tipo: "campanha", campIdx: ci+1,
              motivo: `Produto possivelmente aplicável à Campanha ${ci+1} (página ${camp.page} do informativo).`,
              score: 50 + (est?.qtd>0?15:0),
            });
          }
        });
      });
    }

    return {
      reposicao: reposicao.sort((a,b)=>b.score-a.score).slice(0, 6),
      novoInformativo: novoInformativo.sort((a,b)=>b.score-a.score).slice(0, 6),
      recompra: recompra.sort((a,b)=>b.score-a.score).slice(0, 6),
      campanha: campanha.sort((a,b)=>b.score-a.score).slice(0, 4),
      totalOportunidades: reposicao.length + novoInformativo.length + recompra.length + campanha.length,
    };
  }

  return {
    refDate, periodoVendasDias,
    vendedores, sellers,
    vendByCode, vendByCpf,
    carteiraByCpf, rotByCode,
    cliByCnpj, cliByExtCode,
    vendasByCnpj, vendasByVendedorCode, vendasByCnpjEan,
    estByEan, prodByEan, prodBySku,
    clientesDoVendedor, scoreCliente, recomendaProdutos, recomendaInteligente,
    raw: data,
  };
}

   UI HELPERS
   ============================================================ */
const KpiCard = ({ label, value, sub, grad="grad-blue", icon }) => (
  <div className={`rounded-2xl p-4 ${grad} shadow-lg`}>
    <div className="flex items-start justify-between">
      <div className="text-xs uppercase tracking-wider text-white/80 font-semibold">{label}</div>
      {icon && <span className="text-white/70 text-lg">{icon}</span>}
    </div>
    <div className="mt-2 text-3xl font-bold kpi-num text-white">{value}</div>
    {sub && <div className="mt-1 text-xs text-white/70">{sub}</div>}
  </div>
);
const StatusPill = ({ status }) => {
  const cls = { EM_DIA:"pill-em-dia", ATENCAO:"pill-atencao", CRITICO:"pill-critico", SEM_HIST:"pill-sem-hist" }[status] || "pill-sem-hist";
  return <span className={`pill ${cls}`}>{STATUS_LABEL[status]}</span>;
};
function ProductImage({ ean, sku, prod, size="sm" }) {
  const [img, setImg] = useState(null);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    let alive = true;
    if (!ean) return;
    fetchProductImageByEAN(ean).then(r => { if (alive) { setImg(r); setLoaded(true); } });
    return () => { alive = false; };
  }, [ean]);
  const cls = size==="lg" ? "product-img-lg" : "product-img";
  if (!loaded) return <div className={`${cls} flex items-center justify-center text-slate-500 text-[10px]`}>…</div>;
  if (img?.url) return <img src={img.url} alt={prod?.name||sku||ean} className={cls} loading="lazy" />;
  // Fallback: link Google Imagens
  return (
    <a className={`${cls} flex items-center justify-center text-slate-400 text-[10px] hover:bg-slate-700`}
      href={`https://www.google.com/search?tbm=isch&q=${encodeURIComponent((prod?.name||sku||ean)+" produto")}`}
      target="_blank" rel="noopener" title="Sem imagem no OpenFoodFacts — abrir busca Google Imagens">
      🔍 sem foto
    </a>
  );
}

/* ============================================================
   HOOK COMPARTILHADO: gerencia rota, geocoding, visitas
   Usado por TelaHoje e TelaRota para terem o mesmo estado.
   ============================================================ */
function useRota({ engine, seller, routeState, setRouteState, promos = [], campanhas = [] }) {
  const { incluidos, ordemManual, ordemOtim, otimizado, geo, route, visitas } = routeState;
  const update = (patch) => setRouteState(prev => ({ ...prev, ...patch }));

  const lista = useMemo(() => {
    if (!seller) return [];
    return engine.clientesDoVendedor(seller)
      .map(c => ({ ...c, score: engine.scoreCliente(c) }))
      .sort((a,b) => {
        if (a.noRoteiro !== b.noRoteiro) return a.noRoteiro ? -1 : 1;
        return b.score.total - a.score.total;
      });
  }, [engine, seller]);

  // Inicializar incluidos quando troca seller
  useEffect(() => {
    if (!seller) return;
    const s = new Set();
    lista.forEach(c => { if (c.noRoteiro) s.add(c.cnpj); });
    // Carrega visitas
    const all = loadVisitasAll();
    const sk = seller?.internal_code || "default";
    const dk = todayKey();
    update({
      incluidos: s, ordemManual: null, ordemOtim: null, otimizado: false,
      route: null, visitas: all[sk]?.[dk] || {},
    });
  }, [seller]);

  const persistVisitas = (novo) => {
    const all = loadVisitasAll();
    const sk = seller?.internal_code || "default";
    const dk = todayKey();
    if (!all[sk]) all[sk] = {};
    all[sk][dk] = novo;
    saveVisitasAll(all);
    update({ visitas: novo });
  };

  const incluidosLista = useMemo(() => {
    const arr = lista.filter(c => incluidos.has(c.cnpj));
    const map = new Map(arr.map(c => [c.cnpj, c]));
    if (ordemOtim) return ordemOtim.map(cnpj => map.get(cnpj)).filter(Boolean);
    if (ordemManual) {
      const inOrder = ordemManual.filter(c => incluidos.has(c)).map(c => map.get(c)).filter(Boolean);
      const notInOrder = arr.filter(c => !ordemManual.includes(c.cnpj));
      return [...inOrder, ...notInOrder];
    }
    return arr;
  }, [lista, incluidos, ordemOtim, ordemManual]);

  // próximo cliente pendente (não concluído nem em visita)
  const proxima = useMemo(() => {
    const emV = incluidosLista.find(c => visitas[c.cnpj]?.status === "em_visita");
    if (emV) return { c: emV, emVisita: true };
    const pend = incluidosLista.find(c => visitas[c.cnpj]?.status !== "concluido");
    return pend ? { c: pend, emVisita: false } : null;
  }, [incluidosLista, visitas]);

  const concluidos = incluidosLista.filter(c => visitas[c.cnpj]?.status === "concluido");
  const oportunidades = useMemo(() => {
    let t = 0;
    incluidosLista.forEach(c => {
      try { t += engine.recomendaInteligente(c, promos, campanhas).totalOportunidades; }
      catch(e) {}
    });
    return t;
  }, [incluidosLista, promos, campanhas, engine]);

  // Handlers
  const toggleCli = (cnpj) => {
    const s = new Set(incluidos);
    s.has(cnpj) ? s.delete(cnpj) : s.add(cnpj);
    update({ incluidos: s, ordemOtim: null, route: null, otimizado: false });
  };
  const moveInRoute = (cnpj, dir) => {
    const order = incluidosLista.map(c => c.cnpj);
    const i = order.indexOf(cnpj); if (i<0) return;
    const j = i + dir;
    if (j<0 || j>=order.length) return;
    [order[i], order[j]] = [order[j], order[i]];
    update({ ordemManual: order, ordemOtim: null, otimizado: false, route: null });
  };
  const removeFromRoute = (cnpj) => {
    const s = new Set(incluidos); s.delete(cnpj);
    update({ incluidos: s, ordemOtim: null, otimizado: false, route: null });
  };
  const handleCheckIn = (cnpj) => {
    persistVisitas({ ...visitas, [cnpj]: { ...(visitas[cnpj]||{}), status: "em_visita", checkIn: Date.now() } });
  };
  const abrirProximoNoMaps = (cnpjAtual, vNovo) => {
    const ordem = incluidosLista.map(c => c.cnpj);
    const idx = ordem.indexOf(cnpjAtual);
    let prox = null;
    for (let i = idx+1; i<ordem.length; i++) {
      if ((vNovo||visitas)[ordem[i]]?.status !== "concluido") { prox = incluidosLista[i]; break; }
    }
    if (!prox) { alert("🎉 Rota concluída!"); return; }
    const g = geo[buildAddressQuery(prox.cli)];
    const url = g?.lat ? mapsDestinationUrl({lat:g.lat, lon:g.lon})
                       : mapsDestinationUrl([prox.cli.address, prox.cli.neighborhood, prox.cli.city, prox.cli.state].filter(Boolean).join(", "));
    window.open(url, "_blank");
  };
  const handleCheckOut = (cnpj, opts={}) => {
    const novo = { ...visitas, [cnpj]: { ...(visitas[cnpj]||{}), status:"concluido", checkOut: Date.now() } };
    persistVisitas(novo);
    if (opts.abrirProximo !== false) abrirProximoNoMaps(cnpj, novo);
  };
  const handleResetVisita = (cnpj) => {
    const novo = { ...visitas }; delete novo[cnpj];
    persistVisitas(novo);
  };
  const navegarPara = (cnpj) => {
    const c = incluidosLista.find(x => x.cnpj === cnpj) || lista.find(x => x.cnpj === cnpj);
    if (!c) return;
    const g = geo[buildAddressQuery(c.cli)];
    const url = g?.lat ? mapsDestinationUrl({lat:g.lat, lon:g.lon})
                       : mapsDestinationUrl([c.cli.address, c.cli.neighborhood, c.cli.city, c.cli.state].filter(Boolean).join(", "));
    window.open(url, "_blank");
  };
  // Geocoding + auto-rota
  const [geoProgress, setGeoProgress] = useState(null);
  const [geoFailed, setGeoFailed] = useState([]);
  const handleGeocode = async () => {
    const cache = loadGeo();
    const pre = {...geo};
    lista.forEach(c => { const k = buildAddressQuery(c.cli); if (cache[k]?.lat) pre[k] = cache[k]; });
    update({ geo: pre });
    setGeoProgress({ done:0, total: lista.length });
    setGeoFailed([]);
    const { out, failed } = await geocodeBatch(lista.map(c => c.cli),
      (d,t,f) => setGeoProgress({ done:d, total:t, failed: f?.length||0 }));
    const merged = { ...pre, ...out };
    update({ geo: merged, ordemOtim: null, otimizado: false });
    setGeoFailed(failed);
    setGeoProgress(null);
    // auto-rota
    const ptsIncl = incluidosLista.map(c => merged[buildAddressQuery(c.cli)]).filter(p=>p?.lat);
    if (ptsIncl.length>=2) { try { const r = await osrmRoute(ptsIncl); update({ route: r }); } catch(e){} }
  };
  const handleOtimizar = async () => {
    const pts = incluidosLista.map(c => geo[buildAddressQuery(c.cli)]).filter(p=>p?.lat);
    if (pts.length<2) { alert("Geocodifique primeiro."); return; }
    const cnpjs = incluidosLista.filter(c => geo[buildAddressQuery(c.cli)]?.lat).map(c => c.cnpj);
    const order = nearestNeighborOrder(pts, 0);
    update({ ordemOtim: order.map(i=>cnpjs[i]), otimizado: true, ordemManual: null });
    const coordsOrder = order.map(i => pts[i]);
    try { const r = await osrmRoute(coordsOrder); update({ route: r }); } catch(e){}
  };
  const abrirRotaCompletaTransito = () => {
    const pts = incluidosLista.filter(c => visitas[c.cnpj]?.status !== "concluido")
      .map(c => geo[buildAddressQuery(c.cli)]).filter(p=>p?.lat);
    const url = mapsRotaCompletaUrl(pts);
    if (!url) { alert("Marque clientes na rota e geocodifique primeiro."); return; }
    window.open(url, "_blank");
  };
  // Drag/drop
  const [dragOver, setDragOver] = useState(null);
  const handleDragStart = (e, cnpj, origin) => {
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", JSON.stringify({ cnpj, origin }));
  };
  const handleDragOver = (e, c) => { e.preventDefault(); e.dataTransfer.dropEffect="move"; if (c!==undefined) setDragOver(c); };
  const handleDragLeave = () => setDragOver(null);
  const handleDropOnRouteItem = (e, targetCnpj) => {
    e.preventDefault(); setDragOver(null);
    let p; try { p = JSON.parse(e.dataTransfer.getData("text/plain")); } catch { return; }
    const { cnpj } = p;
    if (!cnpj || cnpj===targetCnpj) return;
    const s = new Set(incluidos); s.add(cnpj);
    const base = incluidosLista.map(c => c.cnpj).filter(c => c !== cnpj);
    const i = base.indexOf(targetCnpj);
    if (i>=0) base.splice(i, 0, cnpj); else base.push(cnpj);
    update({ incluidos: s, ordemManual: base, ordemOtim: null, otimizado: false, route: null });
  };
  const handleDropOnRouteEnd = (e) => {
    e.preventDefault(); setDragOver(null);
    let p; try { p = JSON.parse(e.dataTransfer.getData("text/plain")); } catch { return; }
    if (!p.cnpj) return;
    const s = new Set(incluidos); s.add(p.cnpj);
    const base = incluidosLista.map(c => c.cnpj).filter(c => c !== p.cnpj);
    base.push(p.cnpj);
    update({ incluidos: s, ordemManual: base, ordemOtim: null, otimizado: false, route: null });
  };
  const handleDropOnCarteira = (e) => {
    e.preventDefault(); setDragOver(null);
    let p; try { p = JSON.parse(e.dataTransfer.getData("text/plain")); } catch { return; }
    if (p.origin !== "rota" || !p.cnpj) return;
    const s = new Set(incluidos); s.delete(p.cnpj);
    update({ incluidos: s, ordemOtim: null, otimizado: false, route: null });
  };

  return {
    lista, incluidosLista, proxima, concluidos, oportunidades,
    geo, route, visitas, incluidos,
    ordemManual, ordemOtim, otimizado,
    geoProgress, geoFailed,
    toggleCli, moveInRoute, removeFromRoute,
    handleCheckIn, handleCheckOut, handleResetVisita, navegarPara,
    handleGeocode, handleOtimizar, abrirRotaCompletaTransito,
    handleDragStart, handleDragOver, handleDragLeave,
    handleDropOnRouteItem, handleDropOnRouteEnd, handleDropOnCarteira, dragOver,
  };
}

   APP

const TABS = [
  { id:"hoje",       label:"Hoje",        icon:"📍" },
  { id:"rota",       label:"Rota",        icon:"🗺️" },
  { id:"produtos",   label:"Produtos",    icon:"📦" },
  { id:"supervisor", label:"Supervisor",  icon:"👁️" },
  { id:"dados",      label:"Dados",       icon:"🔍" },
];

function App() {
  const [data, setData] = useState(null);
  const [engine, setEngine] = useState(null);
  const [tab, setTab] = useState("hoje");
  const [sellerCode, setSellerCode] = useState("");
  const [jornal, setJornal] = useState(null);
  const [promos, setPromos] = useState([]);
  const [campanhas, setCampanhas] = useState([]);
  // Estado global compartilhado: planejamento da rota (incluídos, ordens, geo, visitas)
  // levantado para topo para Hoje e Rota compartilharem o mesmo estado
  const [routeState, setRouteState] = useState({
    incluidos: new Set(),
    ordemManual: null,
    ordemOtim: null,
    otimizado: false,
    geo: {},
    route: null,
    visitas: {},
  });
  const [drawerCnpj, setDrawerCnpj] = useState(null); // cliente aberto no drawer

  useEffect(() => { if (data) setEngine(buildEngine(data)); }, [data]);
  useEffect(() => {
    if (!engine || sellerCode) return;
    const first = engine.sellers.find(s => s.internal_code && engine.rotByCode.has(s.internal_code))
               || engine.sellers.find(s => s.internal_code);
    if (first) setSellerCode(first.internal_code);
  }, [engine]);
  useEffect(() => {
    if (engine && jornal?.full) setPromos(detectarPromos(jornal.full, engine));
    if (jornal?.pages) setCampanhas(detectarCampanhas(jornal.pages));
  }, [jornal, engine]);

  if (!data) return (<div className="min-h-screen"><Header /><UploadScreen onLoaded={(d,p) => { setData(d); if (p) setJornal(p); }} /></div>);
  if (!engine) return <div className="p-8 text-center">Construindo engine…</div>;

  const seller = engine.sellers.find(s => s.internal_code === sellerCode);
  const shared = { engine, seller, promos, campanhas, jornal, setJornal,
                   routeState, setRouteState,
                   drawerCnpj, setDrawerCnpj,
                   setSellerAndGoHoje: (c) => { setSellerCode(c); setTab("hoje"); } };

  return (
    <div className="min-h-screen pb-20">
      <Header engine={engine} sellerCode={sellerCode} setSellerCode={setSellerCode}
        onReset={() => { setData(null); setEngine(null); setJornal(null); setPromos([]); setCampanhas([]); }} />
      <Nav tab={tab} setTab={setTab} />
      <main className="max-w-[1600px] mx-auto px-4 pt-5">
        {tab === "hoje"       && <TelaHoje {...shared} />}
        {tab === "rota"       && <TelaRota {...shared} />}
        {tab === "produtos"   && <Produtos {...shared} />}
        {tab === "supervisor" && <TelaSupervisor {...shared} />}
        {tab === "dados"      && <Qualidade engine={engine} />}
      </main>
      {/* Drawer global de detalhes do cliente */}
      {drawerCnpj && <DrawerCliente cnpj={drawerCnpj} {...shared} onClose={() => setDrawerCnpj(null)} />}
    </div>
  );
}
